# set master
unbind C-b
set -g prefix `
bind-key ` send-prefix

unbind [
bind [ previous-window
unbind ]
bind ] next-window
bind \\ last-pane
bind L send-keys '^L'
bind N command-prompt -p "session name:" "new-session -A -s '%%'"

# select-window and create if it does not exist yet
bind 1 if-shell 'tmux select-window -t :1' '' 'new-window -t :1 -c "#{pane_current_path}"'
bind 2 if-shell 'tmux select-window -t :2' '' 'new-window -t :2 -c "#{pane_current_path}"'
bind 3 if-shell 'tmux select-window -t :3' '' 'new-window -t :3 -c "#{pane_current_path}"'
bind 4 if-shell 'tmux select-window -t :4' '' 'new-window -t :4 -c "#{pane_current_path}"'
bind 5 if-shell 'tmux select-window -t :5' '' 'new-window -t :5 -c "#{pane_current_path}"'
bind 6 if-shell 'tmux select-window -t :6' '' 'new-window -t :6 -c "#{pane_current_path}"'
bind 7 if-shell 'tmux select-window -t :7' '' 'new-window -t :7 -c "#{pane_current_path}"'
bind 8 if-shell 'tmux select-window -t :8' '' 'new-window -t :8 -c "#{pane_current_path}"'
bind 9 if-shell 'tmux select-window -t :9' '' 'new-window -t :9 -c "#{pane_current_path}"'
bind 0 if-shell 'tmux select-window -t :0' '' 'new-window -t :0 -c "#{pane_current_path}"'

# disable delays
set -s escape-time 0
set -g repeat-time 0

# enable mouse mode
set -g mouse on

# start windows and panes index at 1
set -g base-index 1
set -g pane-base-index 1

set -g status-position bottom

# status bar
set -g status-style "bg=default,fg=colour252"
set -g status-left ''
set -g status-right '#{?client_prefix,#[bg=colour75]#[fg=colour235]#[bold] P #[default],} #[fg=colour60]#[bold]#S#[default]'
set -g status-right-length 50
set -g status-left-length 20

# window list
setw -g window-status-style "bg=default,fg=colour60"
setw -g window-status-current-style "bg=default,fg=colour75,bold"
setw -g window-status-format ' #I #W '
setw -g window-status-current-format ' #I #W '
setw -g window-status-bell-style "bg=colour75,fg=colour235,bold"

# clipboard passthrough
set -g allow-passthrough on

# scrollback
set -g history-limit 100000

# kill and back to main
bind-key K confirm-before -p "kill #{session_name} and switch to main?" "new-session -Ad -s main \; switch-client -t main \; kill-session -t #{session_name}"

# address vim mode switching delay
set -s escape-time 0

# increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

# upgrade $TERM
set -g default-terminal "tmux-256color"

# enable extended keys (CSI u encoding) for proper modifier key support
# allows Shift+Enter, Ctrl+Shift+<key>, etc. to work correctly in apps
set -s extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'xterm-ghostty:extkeys'

# force Shift+Enter to send LF (C-j) so multiline works reliably in pi inside tmux
# (pi treats "\n" as newline and "\r" as submit)
bind -n S-Enter send-keys C-j

# Focus events enabled for terminals that support them
set -g focus-events on

# Plugin Management
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Session persistence - save and restore tmux sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-vim 'session'      # Restore vim sessions
set -g @resurrect-strategy-nvim 'session'     # Restore neovim sessions
set -g @resurrect-capture-pane-contents 'on'  # Save pane contents

# Automatic session save/restore
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'off'        # Auto-restore last saved session
set -g @continuum-boot 'on'            # Auto-start tmux on boot
set -g @continuum-save-interval '10'   # Save every 10 minutes

# Auto-install TPM if not present
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM (must be last line)
run '~/.config/tmux/plugins/tpm/tpm'
